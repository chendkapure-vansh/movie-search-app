<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Watchlist</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body>

  <!-- ── HEADER: nav with background image ── -->
  <header id="hero">
    <nav>
      <h1>My Watchlist</h1>
      <a href="index.html">← Back to Search</a>
    </nav>
  </header>

  <!-- ── RESULTS SECTION (same IDs as index.html so renderMovies works) ── -->
  <section id="results-section" class="content-section">

    <!-- Empty state (hidden by JS, not used on watchlist page) -->
    <div id="empty-state" class="state-panel"></div>

    <!-- Movies list: filled by renderMovies() from index.js -->
    <div id="movies-container"></div>

    <!-- Shown when watchlist is empty -->
    <div id="error-state" class="state-panel">
      <p>Your watchlist is empty. <a href="index.html" id="add-movies-btn" class="btn-primary">+ Find Movies</a></p>
    </div>

  </section>

  <script type="module" src="index.js"></script>
</body>

</html>
